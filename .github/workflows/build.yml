---
name: build

# health-sync (Node/Hono backend + Angular frontend) — gate the image on `npm
# run verify` (typecheck + schema-drift + biome + angular-eslint + backend and
# frontend unit tests), then build + push xinutec/health-sync:latest to Docker
# Hub. The golden + walk-geometry fixture gates are NOT here: they need the
# gitignored local fixtures and run from scripts/deploy.sh, not CI. The k8s
# manifests + deploy live in the home monorepo (xinutec/pippijn
# code/kubes/health/k8s); the image tag is the only contract with the deploy.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/flake.lock"
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm run verify

  image:
    needs: verify
    runs-on: ubuntu-latest
    # Pushes to Docker Hub via DOCKERHUB_* secrets; the GITHUB_TOKEN only reads the repo.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: xinutec/health-sync:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=xinutec/health-sync:cache
          # mode=max persists the builder-stage layers (npm installs, backend build) too.
          cache-to: type=registry,ref=xinutec/health-sync:cache,mode=max
